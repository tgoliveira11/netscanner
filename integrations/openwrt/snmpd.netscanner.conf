# NetScanner BRIDGE-MIB helper for OpenWrt DSA switches
# Append to /etc/snmp/snmpd.conf (or integrate via UCI — see README).
#
# Communities — use a read-only community that matches NetScanner SNMP_COMMUNITIES.
# Restrict to management / monitoring hosts when possible.

rocommunity YOUR_RO_COMMUNITY default

# Prefer restricting by source when your build supports it, e.g.:
# rocommunity YOUR_RO_COMMUNITY 192.168.0.0/16
# rocommunity YOUR_RO_COMMUNITY 10.0.0.0/8

# Export Linux bridge FDB as BRIDGE-MIB for NetScanner SnmpConnectionSource.
# Requires: /usr/bin/netscanner-bridge-mib (python3) + `ip-bridge` / `bridge` package.
pass_persist .1.3.6.1.2.1.17 /usr/bin/netscanner-bridge-mib

# Keep ordinary system + IF-MIB from snmpd itself (sysDescr, ifDescr, …).
